        const aisle=document.createElement('div');
        aisle.className='wh-detail-aisle';
        aisle.textContent=item;
        sections.appendChild(aisle);
      } else {
        item.forEach(sec=>{
          if(secSet.has(sec)){
            sections.appendChild(makeSecBlockFull(sec));
          } else {
            const ph=document.createElement('div');
            ph.className='wh-placeholder';
            ph.innerHTML=`<span>섹션 ${sec}</span>`;
            sections.appendChild(ph);
          }
        });
      }
    });
  });

  layout.appendChild(sections);
  detail.appendChild(layout);
  wrap.appendChild(detail);
}

function makeSecBlockFull(sec){
  const even=isEven(sec);
  const sd=data.filter(d=>d.section===sec);
  const floors=[...new Set(sd.map(d=>d.floor))].sort((a,b)=>b-a);
  const act=sd.filter(d=>getSlotState(d)==='IN').length;
  const hld=sd.filter(d=>getSlotState(d)==='EMPTY').length;

  const secDiv=document.createElement('div');
  secDiv.className='full-section';

  const hd=document.createElement('div');
  hd.className='full-sec-hd';
  hd.innerHTML=`섹션 ${sec}
    <span style="background:rgba(5,150,105,.12);color:#065f46;padding:1px 6px;border-radius:6px;font-size:9px">✅ ${act}</span>
    ${hld?`<span style="background:rgba(217,119,6,.12);color:#92400e;padding:1px 6px;border-radius:6px;font-size:9px">⏸ ${hld}</span>`:''}`;
  secDiv.appendChild(hd);

  floors.forEach(floor=>{
    const fd=dedupeByKey(sd.filter(d=>d.floor===floor).sort((a,b)=>a.order-b.order));
    const floorRow=document.createElement('div');
    floorRow.className='full-floor-row';
    const lbl=document.createElement('div');
    lbl.className='full-floor-lbl';
    lbl.textContent=floor+'F';
    floorRow.appendChild(lbl);
    const slotsWrap=document.createElement('div');
    slotsWrap.className='full-slots'+(even?' mirrored':'');
    const isGroupType=t=>t==='흰색'||t==='노란색'||t==='서랍';
    let i=0;
    while(i<fd.length){
      const d=fd[i];
      if(isGroupType(d.type)){
        const group=[];let j=i;
        while(j<fd.length&&fd[j].type===d.type&&group.length<4){group.push(fd[j]);j++;}
        const isDrawer=d.type==='서랍';
        const cellW=48;
        const zg=document.createElement('div');
        zg.className='zgroup'+(isDrawer?' drawers':'');
        let arranged;
        if(even){arranged=[group[1]||null,group[0]||null,group[3]||null,group[2]||null];}
        else{arranged=[group[0]||null,group[1]||null,group[2]||null,group[3]||null];}
        arranged.forEach(gd=>{
          if(gd){zg.appendChild(makeSlotEl(gd));}
          else{const em=document.createElement('div');em.style.cssText=`width:${cellW}px;`;zg.appendChild(em);}
        });
        slotsWrap.appendChild(zg);i=j;
      }else{
        slotsWrap.appendChild(makeSlotEl(d));i++;
      }
    }
    floorRow.appendChild(slotsWrap);
    secDiv.appendChild(floorRow);
  });
  return secDiv;
}


/* ══════════════════════════════════
   검색 필터 (소재 / 빈슬롯)
══════════════════════════════════ */
let activeMatFilter = null;  // 'CN10','CN20'... or 'none'
let emptyOnly = false;
let staleOnly = false;

function toggleEmptyFilter(btn){
  emptyOnly = !emptyOnly;
  btn.classList.toggle('on', emptyOnly);
  // 검색 필터바 열기
  document.getElementById('searchFilterBar').classList.add('on');
  triggerFilterSearch();
}

function toggleMatFilter(mat, btn){
  if(activeMatFilter === mat){
    activeMatFilter = null;
    btn.classList.remove('on');
  } else {
    activeMatFilter = mat;
    document.querySelectorAll('.sf-chip:not(.empty-only)').forEach(c=>c.classList.remove('on'));
    btn.classList.add('on');
  }
  triggerFilterSearch();
}

function toggleStaleFilter(btn){
  staleOnly = !staleOnly;
  btn.classList.toggle('on', staleOnly);
  document.getElementById('searchFilterBar').classList.add('on');
  triggerFilterSearch();
}

function triggerFilterSearch(){
  // 필터 적용된 상태로 검색결과 패널 열기
  const q = document.getElementById('searchInput').value.trim();
  searchQ = q.toUpperCase();
  renderFilteredResults();
  const panel = document.getElementById('searchResultPanel');
  const tbH = document.querySelector('.topbar').getBoundingClientRect().bottom;
  panel.style.top = tbH + 'px';
  panel.classList.add('on');
}

function renderFilteredResults(){
  const list = document.getElementById('searchResultList');
  const header = document.getElementById('searchResultHeader');
  list.innerHTML = '';

  let matches = data.filter(d => {
    // 텍스트 검색
    const textMatch = !searchQ ||
      d.section.toUpperCase().includes(searchQ) ||
      (d.item||'').toUpperCase().includes(searchQ) ||
      (d.material||'').toUpperCase().includes(searchQ) ||
      (d.memo||'').toUpperCase().includes(searchQ);
    // 빈 슬롯 필터
    const emptyMatch = !emptyOnly || getSlotState(d)==='EMPTY';
    // 소재 필터
    const matMatch = !activeMatFilter ||
      (activeMatFilter === 'none' ? !d.material : (d.material||'').toUpperCase() === activeMatFilter.toUpperCase());
    // 장기미출고 필터
    const staleMatch = !staleOnly || getStaleInfo(d).stale;
    return textMatch && emptyMatch && matMatch && staleMatch;
  });

  // 정렬: 빈슬롯 모드면 섹션순, 아니면 기존
  if(emptyOnly){
    matches.sort((a,b) => a.section.localeCompare(b.section) || a.floor-b.floor || a.order-b.order);
  } else {
    matches.sort((a,b) => {
      const aEx = (a.item||'').toUpperCase() === searchQ;
      const bEx = (b.item||'').toUpperCase() === searchQ;
      if(aEx && !bEx) return -1;
      if(!aEx && bEx) return 1;
      return !!(b.item) - !!(a.item);
    });
  }

  // 필터 설명
  let filterDesc = '';
  if(emptyOnly) filterDesc += ' · 빈 슬롯만';
  if(activeMatFilter) filterDesc += ` · ${activeMatFilter}`;
  if(staleOnly) filterDesc += ' · 장기미출고';
  header.innerHTML = `<b style="color:var(--text)">${matches.length}개</b> 결과${filterDesc}`;

  if(matches.length === 0){
    list.innerHTML = `<div class="no-results"><div style="font-size:32px;margin-bottom:12px">🔍</div>조건에 맞는 슬롯이 없어요</div>`;
    return;
  }

  matches.forEach(d => {
    const card = document.createElement('div');
    card.className = 'result-card';
    const slotId = `${d.section}${d.floor}-${d.order}`;
    const matColor = {'CN10':'#facc15','CN20':'#374151','RS40':'#0d9488','RS20':'#6b7280','CM20':'#d1d5db'}[d.material] || null;
    const isEmpty = !d.item && !d.qty;
    card.innerHTML = `
      <div class="result-loc">
        <div class="result-path">${slotId}</div>
        ${isEmpty
          ? `<div style="font-size:12px;color:#10b981;font-weight:600">⬜ 비어있음</div>`
          : `<div class="result-item">📦 ${d.item||'품목없음'}${d.qty!==''&&d.qty!=null?' · '+d.qty+'개':''}</div>`
        }
        <div class="result-meta">
          <span>${d.type||'미지정'}</span>
          ${d.material ? `<span style="background:${matColor}20;color:${matColor};padding:1px 6px;border-radius:6px;font-weight:700">${d.material}</span>` : ''}
          ${d.status ? `<span>${d.status}</span>` : ''}
        </div>
      </div>
      ${d.status ? `<div class="result-status ${d.status}">${d.status}</div>` : ''}
    `;
    card.addEventListener('click', () => {
      closeSearchResults();
      setTimeout(() => { openSection(d.section); setTimeout(() => openSheet(d.id), 200); }, 100);
    });
    list.appendChild(card);
  });
}

/* ══════════════════════════════════
   빈 슬롯 자리 추천
══════════════════════════════════ */
let recommendMode = false;
let selectedRecMat = null;

function openRecommend(){
  recommendMode = true;
  selectedRecMat = null;
  document.getElementById('recommendPanel').classList.add('on');
  renderRecommend(null);
  // topbar 높이에 맞춤
  const tbH = document.querySelector('.topbar').getBoundingClientRect().bottom;
  document.getElementById('recommendPanel').style.top = tbH + 'px';
}

function closeRecommend(){
  recommendMode = false;
  selectedRecMat = null;
  document.getElementById('recommendPanel').classList.remove('on');
  // 하이라이트 제거
  document.querySelectorAll('.slot.recommend,.slot.dim-recommend').forEach(s=>{
    s.classList.remove('recommend','dim-recommend');
  });
}

function renderRecommend(mat){
  selectedRecMat = mat;
  const chips = document.getElementById('recommendChips');
  const recList = document.getElementById('recommendList');
  const subtitle = document.getElementById('recommendSubtitle');

  const MATS = ['CN10','CN20','RS40','RS20','CM20'];
  chips.innerHTML = MATS.map(m =>
    `<div class="rec-chip${mat===m?' on':''}" onclick="renderRecommend('${m}')">${m}</div>`
  ).join('') + `<div class="rec-chip${mat===null?' on':''}" onclick="renderRecommend(null)">전체</div>`;

  // 빈 슬롯 찾기
  const emptySlots = data.filter(d => getSlotState(d)==='EMPTY');

  if(emptySlots.length === 0){
    recList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">빈 슬롯이 없어요</div>';
    subtitle.textContent = '빈 슬롯 없음';
    return;
  }

  // 점수 계산
  const scored = emptySlots.map(slot => {
    let score = 0;
    let reasons = [];

    if(mat){
      // 같은 소재가 같은 섹션에 있는지
      const sameSectionSameMat = data.filter(d =>
        d.section === slot.section && d.material === mat && d.item
      ).length;
      // 같은 층에 같은 소재
      const sameFloorSameMat = data.filter(d =>
        d.section === slot.section && d.floor === slot.floor && d.material === mat && d.item
      ).length;
      // 인접 슬롯에 같은 소재
      const adjacentSameMat = data.filter(d =>
        d.section === slot.section && d.floor === slot.floor &&
        Math.abs(d.order - slot.order) <= 2 && d.material === mat && d.item
      ).length;

      score += sameSectionSameMat * 10;
      score += sameFloorSameMat * 20;
      score += adjacentSameMat * 40;

      if(adjacentSameMat > 0) reasons.push(`바로 옆에 ${mat} 있음`);
      else if(sameFloorSameMat > 0) reasons.push(`같은 층에 ${mat} ${sameFloorSameMat}개`);
      else if(sameSectionSameMat > 0) reasons.push(`같은 섹션에 ${mat} ${sameSectionSameMat}개`);
    }

    // 섹션의 전체 밀집도 (빈 슬롯 비율이 낮을수록 = 잘 안쓰이는 공간 = 낮은 점수)
    const sectionTotal = data.filter(d => d.section === slot.section).length;
    const sectionUsed = data.filter(d => d.section === slot.section && (d.item || d.qty)).length;
    const usageRate = sectionUsed / sectionTotal;
    score += usageRate * 15;

    if(reasons.length === 0){
      if(usageRate > 0.5) reasons.push(`섹션 ${slot.section} 활용률 ${Math.round(usageRate*100)}%`);
      else reasons.push(`섹션 ${slot.section} · ${slot.floor}층 · 빈 슬롯`);
    }

    return { slot, score, reason: reasons[0] || '' };
  });

  scored.sort((a,b) => b.score - a.score);
  const top = scored.slice(0, 8);

  subtitle.textContent = mat
    ? `${mat} 소재 기준 최적 위치 ${top.length}개`
    : `빈 슬롯 ${emptySlots.length}개 중 추천`;

  recList.innerHTML = '';
  top.forEach((item, idx) => {
    const d = item.slot;
    const slotId = `${d.section}${d.floor}-${d.order}`;
    const card = document.createElement('div');
    card.className = 'rec-card';
    card.innerHTML = `
      <div class="rec-rank">${idx+1}</div>
      <div class="rec-info">
        <div class="rec-loc">${slotId} · 섹션${d.section} ${d.floor}층 #${d.order}</div>
        <div class="rec-reason">${item.reason}</div>
      </div>
      <div class="rec-type">${d.type||'미지정'}</div>
    `;
    card.addEventListener('click', () => {
      closeRecommend();
      setTimeout(() => { openSection(d.section); setTimeout(() => openSheet(d.id), 200); }, 100);
    });
    recList.appendChild(card);
  });

  // 전체뷰에서 추천 슬롯 하이라이트 (전체뷰 탭일 때)
  if(currentTab === 'full'){
    const topIds = new Set(top.map(t => t.slot.id));
    document.querySelectorAll('.slot').forEach(el => {
      const idAttr = el.getAttribute('data-id');
      if(!idAttr) return;
      const id = parseInt(idAttr);
      if(topIds.has(id)){ el.classList.add('recommend'); el.classList.remove('dim-recommend'); }
      else { el.classList.add('dim-recommend'); el.classList.remove('recommend'); }
    });
  }
}


/* ══════════════════════════════════════
   📊 스프레드시트 테이블 뷰
══════════════════════════════════════ */
let tblSortKey = 'loc';
let tblSortAsc = true;
let selectedIds = new Set();

const MAT_COLORS = {CN10:'#facc15',CN20:'#374151',RS40:'#0d9488',RS20:'#6b7280',CM20:'#d1d5db'};
const STATE_COLORS = {IN:'#059669',EMPTY:'#64748b',UNUSED:'#94a3b8'};

function renderTable(){
  const sorted = [...data].sort((a,b)=>{
    let av, bv;
    const getVal = (d,k)=>{
      if(k==='loc') return `${d.section}${String(d.floor).padStart(2,'0')}-${String(d.order).padStart(3,'0')}`;
      if(k==='state') return getSlotState(d);
      return String(d[k]||'').toLowerCase();
    };
    av=getVal(a,tblSortKey); bv=getVal(b,tblSortKey);
    return tblSortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  const tbody = document.getElementById('whTableBody');
  tbody.innerHTML='';

  sorted.forEach(d=>{
    const state = getSlotState(d);
    const loc = `${d.section}${d.floor}-${d.order}`;
    const matColor = MAT_COLORS[d.material]||null;
    const isSelected = selectedIds.has(d.id);

    const tr = document.createElement('tr');
    if(isSelected) tr.classList.add('selected');
    tr.dataset.id = d.id;

    tr.innerHTML = `
      <td><input type="checkbox" class="tbl-checkbox" ${isSelected?'checked':''} onclick="tblToggleRow(event,${d.id})"></td>
      <td style="font-weight:700;color:var(--accent)">${loc}</td>
      <td>${d.section}</td>
      <td>${d.floor}층</td>
      <td style="font-size:11px">${d.type||'-'}</td>
      <td><span class="tbl-state ${state}">${state==='IN'?'🟢 입고':state==='EMPTY'?'⬜ 공실':'🔴 미사용'}</span></td>
      <td style="font-weight:${d.item?'700':'400'};color:${d.item?'var(--text)':'var(--muted)'}">${d.item||'-'}</td>
      <td>${d.material?`<span class="tbl-mat" style="background:${matColor}">${d.material}</span>`:'-'}</td>
      <td>${d.qty||'-'}</td>
      <td style="font-size:11px;color:var(--muted)">${d.inDate||'-'}</td>
      <td style="font-size:11px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.memo||''}</td>
    `;

    // 더블클릭 → 해당 섹션으로 이동 후 슬롯 편집창 열기
    tr.addEventListener('dblclick', ()=>{
      switchTab('full');
      setTimeout(()=>{ openSection(d.section); setTimeout(()=>openSheet(d.id),250); },100);
    });

    // 단일클릭 → 체크박스 토글
    tr.addEventListener('click', (e)=>{
      if(e.target.type==='checkbox') return;
      tblToggleRow(e, d.id);
    });

    tbody.appendChild(tr);
  });

  updateSelectedUI();
}

function tblSort(key){
  if(tblSortKey===key) tblSortAsc=!tblSortAsc;
  else { tblSortKey=key; tblSortAsc=true; }
  // 헤더 아이콘 업데이트
  document.querySelectorAll('.wh-table th').forEach(th=>{
    th.classList.remove('sorted');
    const ic=th.querySelector('.sort-icon');
    if(ic) ic.textContent='↕';
  });
  const ths = document.querySelectorAll('.wh-table th');
  const keyMap = ['','loc','section','floor','type','state','item','material','qty','inDate',''];
  const idx = keyMap.indexOf(key);
  if(idx>=0 && ths[idx]){
    ths[idx].classList.add('sorted');
    const ic=ths[idx].querySelector('.sort-icon');
    if(ic) ic.textContent=tblSortAsc?'↑':'↓';
  }
  renderTable();
}

function tblToggleRow(e, id){
  if(selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderTable();
}

function tblToggleAll(chk){
  if(chk.checked){ data.forEach(d=>selectedIds.add(d.id)); }
  else { selectedIds.clear(); }
  renderTable();
}

function tblSelectAll(){ data.forEach(d=>selectedIds.add(d.id)); renderTable(); }
function tblClearSelect(){ selectedIds.clear(); renderTable(); }

function updateSelectedUI(){
  const n = selectedIds.size;
  const cnt = document.getElementById('tblSelectedCount');
  const btn = document.getElementById('pdfBtn');
  cnt.textContent = n+'개 선택됨';
  cnt.classList.toggle('on', n>0);
  btn.disabled = n===0;
  document.getElementById('chkAll').checked = n>0 && n===data.length;
}

    const stateColor = STATE_COLORS[state]||'#94a3b8';

    const bgColor = d.material ? (
      d.material==='CN10'?'#facc15':
      d.material==='CN20'?'#d1d5db':
      d.material==='RS40'?'#99f6e4':
      d.material==='RS20'?'#e5e7eb':
      d.material==='CM20'?'#f5d9b8':'#f0f0f0'

    const dividerColor = d.material ? matColor+'66' : '#ccc';
    const textColor = d.material==='CN20'?'#1f2937':'#111';

    return `

/* ── 인쇄 대기열 ── */
const PQ_KEY='wh_print_queue';
function getPrintQueue(){ try{return JSON.parse(localStorage.getItem(PQ_KEY))||[]}catch(e){return[]} }
function savePrintQueue(q){ localStorage.setItem(PQ_KEY,JSON.stringify(q)); updateQueueBadge(); }

function updateQueueBadge(){
  const q=getPrintQueue();
  const badge=document.getElementById('pqBadge');
  if(q.length>0){badge.style.display='inline';badge.textContent=q.length;}
  else{badge.style.display='none';}
}

function addToQueue(){
  if(editingId===null)return;
  const d=data[editingId];
  const loc=`${d.section}${d.floor}-${d.order}`;
  const item=document.getElementById('sheetItem').value.trim();
  const mat=document.getElementById('sheetMaterial').value.trim();
  if(!item && !mat){showToast('치수 또는 소재를 입력해주세요');return;}
  const q=getPrintQueue();
  // 중복 체크
  const exists=q.find(x=>x.loc===loc && x.item===item && x.mat===mat);
  if(exists){showToast('이미 대기열에 있습니다');return;}
  q.push({loc,item,mat,ts:Date.now()});
  savePrintQueue(q);
  showToast('🏷 인쇄 대기열에 추가됨 ('+q.length+'개)');
}

function removePQItem(idx){
  const q=getPrintQueue();
  q.splice(idx,1);
  savePrintQueue(q);
  renderPrintQueue();
}

function clearPrintQueue(){
  if(!getPrintQueue().length)return;
  if(!confirm('대기열을 모두 삭제할까요?'))return;
  savePrintQueue([]);
  renderPrintQueue();
}

function renderPrintQueue(){
  const q=getPrintQueue();
  const wrap=document.getElementById('pqList');
  document.getElementById('pqCount').textContent=q.length+'개';
  if(!q.length){
    wrap.innerHTML='<div class="pq-empty">대기열이 비어있습니다.<br>슬롯 편집 화면에서 🏷 인쇄추가 버튼을 눌러주세요.</div>';
    return;
  }
  let h='<div class="pq-list">';
  q.forEach(function(x,i){
    const mc=MAT_COLORS[x.mat]||'#999';
    h+='<div class="pq-card">';
    h+='<button class="pq-card-del" onclick="removePQItem('+i+')">✕</button>';
    h+='<div class="pq-card-loc">'+x.loc+'</div>';
    if(x.item) h+='<div class="pq-card-item">'+x.item+'</div>';
    if(x.mat) h+='<div class="pq-card-mat" style="background:'+mc+'">'+x.mat+'</div>';
    h+='</div>';
  });
  h+='</div>';
  wrap.innerHTML=h;
}

function printQueue(){
  const q=getPrintQueue();
  if(!q.length){showToast('인쇄할 항목이 없습니다');return;}
  const area=document.getElementById('pqPrintArea');
  const printAreaOld=document.getElementById('printArea');
  const baseUrl=location.origin+location.pathname;
  const LBL_COLORS={CN10:'#facc15',CN20:'#4b5563',RS40:'#7dd3e8',RS20:'#9ca3af',CM20:'#d1d5db'};

    h+='</div>';

    h+='</div>';
  });
  area.innerHTML=h;
  // QR 생성
  q.forEach(function(x,i){
    try{
      new QRCode(document.getElementById('pqlQr'+i),{
        text:baseUrl+'?slot='+encodeURIComponent(x.loc),

        colorDark:'#000',colorLight:'#fff',

  document.querySelectorAll('.panel,.topbar,.tabbar,.sheet-backdrop,.sheet,.popup-backdrop,.slot-popup,.toast,.search-result-panel').forEach(el=>el.dataset.pqHide=el.style.display||'');

<script>
/* ── 전체지도 핀치줌 + 드래그 (상세뷰에서만 활성) ── */
(function(){
  const viewport = document.getElementById('mapViewport');
  const canvas   = document.getElementById('mapCanvas');
  if(!viewport||!canvas) return;

  let scale=1, minScale=0.15, maxScale=3;
  let originX=0, originY=0;
  let lastDist=0, lastMidX=0, lastMidY=0;
  let dragging=false, dragStartX=0, dragStartY=0, dragOriginX=0, dragOriginY=0;

  function applyTransform(){
    canvas.style.transform=`translate(${originX}px,${originY}px) scale(${scale})`;
  }

  function clampOrigin(){
    const vw=viewport.clientWidth, vh=viewport.clientHeight;
    const cw=canvas.scrollWidth*scale, ch=canvas.scrollHeight*scale;
    // 여유를 줘서 충분히 스크롤 가능하게
    const margin=100;
    const minX=Math.min(0, vw-cw-margin), minY=Math.min(0, vh-ch-margin);
    originX=Math.max(minX, Math.min(margin, originX));
    originY=Math.max(minY, Math.min(margin, originY));
  }

  function isOverview(){ return !fullViewGroup; }

  // 초기 스케일: 전체가 화면에 들어오게
  function initScale(){
    if(isOverview()){
      // overview에서는 transform 리셋, overflow 복원
      scale=1; originX=0; originY=0;
      canvas.style.transform='';
      viewport.style.overflow='hidden';
      return;
    }
    // 모바일 상세뷰: transform 대신 네이티브 스크롤 사용
    const isMobile = window.innerWidth <= 768;
    if(isMobile){
      scale=1; originX=0; originY=0;
      canvas.style.transform='none';
      viewport.style.overflow='auto';
      return;
    }
    const vw=viewport.clientWidth, vh=viewport.clientHeight;
    const cw=canvas.scrollWidth, ch=canvas.scrollHeight;
    if(!cw||!ch) return;
    scale=Math.min(vw/cw, vh/ch, 1) * 0.95;
    originX=0; originY=0;
    applyTransform();
  }
  window.reinitMap = initScale;

  // fullview 탭 열릴 때 초기화
  const origRenderFullView = window.renderFullView;
  window.renderFullView = function(){
    origRenderFullView && origRenderFullView();
    setTimeout(initScale, 100);
  };
  // 로컬 파일 포함 다양한 환경에서 확실히 실행
  setTimeout(initScale, 100);
  setTimeout(initScale, 500);
  setTimeout(initScale, 1500);
  window.addEventListener('load', ()=>setTimeout(initScale, 200));

  // 터치 이벤트
  viewport.addEventListener('touchstart', e=>{
    if(isOverview()) return;
    // 모바일 상세뷰: 네이티브 스크롤 사용, 커스텀 핀치/드래그 비활성화
    if(window.innerWidth<=768) return;
    if(e.touches.length===2){ e.preventDefault();
      const t0=e.touches[0], t1=e.touches[1];
      lastDist=Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
      lastMidX=(t0.clientX+t1.clientX)/2;
      lastMidY=(t0.clientY+t1.clientY)/2;
      dragging=false;
    } else if(e.touches.length===1){
      dragging=true;
      dragStartX=e.touches[0].clientX;
      dragStartY=e.touches[0].clientY;
      dragOriginX=originX;
      dragOriginY=originY;
    }
  },{passive:false});

  viewport.addEventListener('touchmove', e=>{
    if(isOverview()) return;
    if(window.innerWidth<=768) return;
    if(e.touches.length===2){
      e.preventDefault();
      const t0=e.touches[0], t1=e.touches[1];
      const dist=Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
      const midX=(t0.clientX+t1.clientX)/2;
      const midY=(t0.clientY+t1.clientY)/2;
      const rect=viewport.getBoundingClientRect();

      const ratio=dist/lastDist;
      const newScale=Math.max(minScale, Math.min(maxScale, scale*ratio));

      // 줌 중심점 기준으로 origin 조정
      const focalX=midX-rect.left;
      const focalY=midY-rect.top;
      originX=focalX-(focalX-originX)*(newScale/scale);
      originY=focalY-(focalY-originY)*(newScale/scale);
      scale=newScale;

      // 드래그도 동시에
      originX+=midX-lastMidX;
      originY+=midY-lastMidY;

      lastDist=dist; lastMidX=midX; lastMidY=midY;
      clampOrigin();
      applyTransform();
    } else if(e.touches.length===1 && dragging){
      e.preventDefault();
      originX=dragOriginX+(e.touches[0].clientX-dragStartX);
      originY=dragOriginY+(e.touches[0].clientY-dragStartY);
      clampOrigin();
      applyTransform();
    }
  },{passive:false});

  viewport.addEventListener('touchend', e=>{
    if(e.touches.length<2) lastDist=0;
    if(e.touches.length===0) dragging=false;
  },{passive:true});

  // 마우스 드래그 (데스크탑)
  let mouseDown=false, mStartX=0, mStartY=0, mOriginX=0, mOriginY=0;
  viewport.addEventListener('mousedown', e=>{
    if(isOverview()) return;
    mouseDown=true;
    mStartX=e.clientX; mStartY=e.clientY;
    mOriginX=originX; mOriginY=originY;
    viewport.style.cursor='grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e=>{
    if(!mouseDown) return;
    originX=mOriginX+(e.clientX-mStartX);
    originY=mOriginY+(e.clientY-mStartY);
    clampOrigin();
    applyTransform();
  });
  window.addEventListener('mouseup', ()=>{
    mouseDown=false;
    viewport.style.cursor='grab';
  });
  viewport.style.cursor='grab';

  // 마우스 휠 (데스크탑) → 확대/축소
  viewport.addEventListener('wheel', e=>{
    if(isOverview()) return;
    e.preventDefault();
    const rect=viewport.getBoundingClientRect();
    const focalX=e.clientX-rect.left;
    const focalY=e.clientY-rect.top;
    const delta=e.deltaY>0?0.9:1.1;
    const newScale=Math.max(minScale, Math.min(maxScale, scale*delta));
    originX=focalX-(focalX-originX)*(newScale/scale);
    originY=focalY-(focalY-originY)*(newScale/scale);
    scale=newScale;
    clampOrigin();
    applyTransform();
  },{passive:false});

  // 더블탭 = 100% 리셋 (핀치줌 후 오인식 방지)
  let lastTap=0, wasPinch=false;
  viewport.addEventListener('touchstart', e=>{
    if(e.touches.length>=2) wasPinch=true;
  },{passive:true});
  viewport.addEventListener('touchend', e=>{
    if(e.touches.length===0){
      if(wasPinch){ wasPinch=false; lastTap=0; return; }
      const now=Date.now();
      if(now-lastTap<300){ initScale(); }
      lastTap=now;
    }
  },{passive:true});
})();
</script>

<div id="slotTooltip"></div>
<script>
/* ── 전역 슬롯 툴팁 (PC hover + 모바일 long-press) ── */
(function(){
  const tip=document.getElementById('slotTooltip');
  let longPressTimer=null, activeTouchSlot=null;

  function showTip(slot, x, y){
    const inner=slot.querySelector('.slot-tip');
    if(!inner) return;
    tip.innerHTML=inner.innerHTML;
    tip.style.display='block';
    // 위치 계산: 슬롯 위에 표시, 화면 밖 나가면 조정
    const tw=tip.offsetWidth, th=tip.offsetHeight;
    let left=x-tw/2, top=y-th-12;
    if(left<4) left=4;
    if(left+tw>window.innerWidth-4) left=window.innerWidth-tw-4;
    if(top<4) top=y+20; // 위에 공간 없으면 아래로
    tip.style.left=left+'px';
    tip.style.top=top+'px';
  }

  function hideTip(){
    tip.style.display='none';
    activeTouchSlot=null;
  }

  // PC: mouseover/mouseout
  document.addEventListener('mouseover', e=>{
    const slot=e.target.closest('.slot');
    if(!slot) return;
    const rect=slot.getBoundingClientRect();
    showTip(slot, rect.left+rect.width/2, rect.top);
  });
  document.addEventListener('mouseout', e=>{
    const slot=e.target.closest('.slot');
    if(slot) hideTip();
  });

  // 모바일: tap으로 툴팁 표시
  let touchMoved=false;
  document.addEventListener('touchstart', e=>{
    const slot=e.target.closest('.slot');
    if(!slot){ hideTip(); return; }
    touchMoved=false;
    activeTouchSlot=slot;
  },{passive:true});

  document.addEventListener('touchmove', ()=>{
    touchMoved=true;
  },{passive:true});

  document.addEventListener('touchend', e=>{
    if(touchMoved || !activeTouchSlot) return;
    const slot=activeTouchSlot;
    const rect=slot.getBoundingClientRect();
    showTip(slot, rect.left+rect.width/2, rect.top);
    clearTimeout(longPressTimer);
    longPressTimer=setTimeout(hideTip, 2500);
  },{passive:true});
})();
</script>
