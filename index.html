<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#f9f7f4"/>
<title>🏭 창고 맵</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');


:root{
  --bg:#f5f3f0;--surface:#ffffff;--surface2:#f0ede8;--border:#e5e0d8;
  --accent:#d97706;--active:#059669;--hold:#d97706;--text:#1c1917;--muted:#78716c;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --반박스:#6366f1;--풀박스:#9333ea;--흰색:#64748b;--노란색:#d97706;--초소형:#0891b2;--서랍:#db2777;
  --CN10:#facc15;--CN20:#374151;--RS40:#0d9488;--RS20:#6b7280;--CM20:#d1d5db;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard','IBM Plex Sans KR',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;padding-bottom:80px;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
.slot{image-rendering:crisp-edges;-webkit-backface-visibility:hidden;backface-visibility:hidden}

/* ── 상단 헤더 ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:12px 16px 10px;box-shadow:var(--shadow);
}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-family:'IBM Plex Mono';font-size:16px;font-weight:700;color:var(--accent)}
.topbar-actions{display:flex;gap:8px}
.icon-btn{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:7px 10px;font-size:13px;cursor:pointer;color:var(--text);
  display:flex;align-items:center;gap:4px;box-shadow:var(--shadow);
}
.search-bar{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  display:flex;align-items:center;gap:8px;padding:9px 12px;box-shadow:var(--shadow);
}
.search-bar input{
  flex:1;background:none;border:none;color:var(--text);font-size:14px;outline:none;
  font-family:'IBM Plex Sans KR';
}
.search-bar input::placeholder{color:var(--muted)}
.search-clear{color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;display:none}

/* ── 바텀 탭바 ── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg);border-top:1px solid var(--border);backdrop-filter:blur(12px);
  display:flex;padding-bottom:var(--safe-bottom);
}
.tabbar-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;cursor:pointer;gap:3px;
  font-size:10px;color:var(--muted);font-family:'IBM Plex Mono';
  transition:color .12s;
}
.tabbar-item.on{color:var(--accent);font-weight:600}
.tabbar-icon{font-size:20px;line-height:1}

/* ── 패널 ── */
.panel{display:none;padding:12px 16px}
.panel.on{display:block}

/* ── 통계 칩 ── */
.stats-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat-chip{
  flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:6px 12px;box-shadow:var(--shadow);font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.stat-chip b{font-family:'IBM Plex Mono';color:var(--text)}
.sdot{width:7px;height:7px;border-radius:50%}

/* ── 필터 칩 ── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fchip{
  flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:7px 14px;font-size:12px;color:var(--muted);cursor:pointer;box-shadow:var(--shadow);
}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(217,119,6,.3)}

/* ── 조감도 그리드 ── */
.overview-grid{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.aisle-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-md)}
.aisle-label{
  background:var(--surface2);padding:8px 14px;
  font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.aisle-label::before{content:"";flex:1;height:1px;background:var(--border)}
.aisle-label::after{content:"";flex:1;height:1px;background:var(--border)}
.aisle-sections{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.ov-sec{
  background:var(--surface);padding:12px 14px;cursor:pointer;
  transition:all .15s;
}
.ov-sec:hover{background:var(--surface2)}.ov-sec:active{background:var(--surface2)}
.ov-sec-name{font-family:'IBM Plex Mono';font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px}
.ov-sec.mirror .ov-sec-name{text-align:right}
.ov-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.ov-sec.mirror .ov-chips{justify-content:flex-end}
.ov-chip{font-size:10px;font-family:'IBM Plex Mono';padding:2px 7px;border-radius:10px}
.ov-chip.in{background:rgba(16,185,129,.15);color:#059669;font-weight:700}
.ov-chip.empty{background:rgba(148,163,184,.15);color:#64748b}
.ov-chip.unused{background:rgba(0,0,0,.06);color:#94a3b8;text-decoration:line-through}
.ov-floor-bars{display:flex;flex-direction:column;gap:3px}
.ov-fbar{display:flex;align-items:center;gap:6px}
.ov-fbar-lbl{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono';width:16px;text-align:right;flex-shrink:0}
.ov-fbar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;display:flex}
.ov-fbar-active{background:#34d399;height:100%}
.ov-fbar-hold{background:#fbbf24;height:100%}
.ov-fbar-none{background:#1e2940;height:100%}
.ov-fbar-cnt{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono';width:22px}

/* ── 섹션 목록 ── */
.section-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.sec-row{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:all .15s;box-shadow:var(--shadow);
}
.sec-row:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-1px)}.sec-row:active{border-color:var(--accent)}
.sec-row-left{display:flex;align-items:center;gap:12px}
.sec-badge{
  font-family:'IBM Plex Mono';font-size:18px;font-weight:700;color:var(--accent);
  background:rgba(56,189,248,.1);border-radius:10px;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sec-info{display:flex;flex-direction:column;gap:3px}
.sec-name{font-family:'IBM Plex Mono';font-size:14px;font-weight:600;color:var(--text)}
.sec-sub{font-size:11px;color:var(--muted);display:flex;gap:8px}
.sec-chevron{color:var(--muted);font-size:18px}

/* ── 섹션 상세 (드릴다운) ── */
.detail-header{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.back-btn{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:8px 12px;font-size:14px;cursor:pointer;color:var(--text);flex-shrink:0;box-shadow:var(--shadow);
}
.detail-title{font-family:'IBM Plex Mono';font-size:18px;font-weight:700;color:var(--accent)}

.floor-block{margin-bottom:16px}
.floor-hd{
  font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.floor-hd::after{content:"";flex:1;height:1px;background:var(--border)}


/* ── 전체뷰 ── */
#panel-full{overflow:auto;position:relative;height:calc(100vh - 120px);-webkit-overflow-scrolling:touch;}
.full-warehouse{padding:0;min-width:unset;height:100%;}

/* 그룹 지도 개요 - 통합 레이아웃 */
.wh-map{display:flex;justify-content:center;align-items:stretch;height:100%;padding:0;overflow:auto;-webkit-overflow-scrolling:touch}
.wh-map-grid{
  display:grid;
  grid-template-columns:repeat(12,minmax(28px,1fr));
  grid-template-rows:repeat(16,minmax(28px,1fr));
  gap:2px;
  width:100%;height:100%;min-width:340px;
}
.wh-map-block{
  border-radius:6px;font-size:clamp(11px,3vw,18px);font-weight:800;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono';cursor:pointer;transition:all .15s;
  min-height:0;border:1px solid rgba(0,0,0,.08);
}
.wh-map-block:hover{filter:brightness(.9);box-shadow:0 2px 10px rgba(0,0,0,.2);z-index:5}
.wh-map-block:active{transform:scale(.97)}
.wh-map-block.sec-ai{background:#fbbf24;color:#78350f}
.wh-map-block.sec-jp{background:#6ee7b7;color:#064e3b}
.wh-map-block.sec-qu{background:#a5b4fc;color:#312e81}
.wh-map-block.sec-extra{background:#d1d5db;color:#1f2937}
.wh-group-stats{display:flex;gap:12px;flex-wrap:wrap}
.wh-group-stat{
  font-family:'IBM Plex Mono';font-size:12px;font-weight:600;
  padding:4px 10px;border-radius:8px;
}
.wh-group-bar{
  margin-top:12px;height:6px;border-radius:3px;background:#e5e0d8;overflow:hidden;
  display:flex;
}
.wh-group-bar span{height:100%;transition:width .3s}

/* 그룹 상세뷰 */
.wh-detail{padding:12px;overflow-x:auto;}
.wh-detail-back{
  font-family:'IBM Plex Mono';font-size:13px;font-weight:700;
  color:var(--accent);cursor:pointer;padding:8px 14px;
  border:1px solid var(--border);border-radius:10px;background:var(--surface);
  margin-bottom:12px;display:inline-flex;align-items:center;gap:6px;
  box-shadow:var(--shadow);
}
.wh-detail-back:hover{background:var(--surface2)}
.wh-detail-sections{display:flex;flex-direction:column;gap:6px;}
.wh-detail-aisle{
  font-family:'IBM Plex Mono';font-size:10px;font-weight:700;color:var(--muted);
  display:flex;align-items:center;gap:8px;padding:4px 0;
}
.wh-detail-aisle::before,.wh-detail-aisle::after{content:"";flex:1;height:1px;background:var(--border)}
.wh-placeholder{
  background:#fff;border:2px dashed #d5cfc6;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  min-height:40px;padding:8px 4px;
  font-family:'IBM Plex Mono';font-size:13px;font-weight:700;color:#b0a89e;
}
.full-pair{display:flex;flex-direction:column;gap:3px}
.full-section{display:flex;flex-direction:column;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 8px;box-shadow:var(--shadow)}
.extra-col .full-section{gap:2px;padding:4px 6px}
.full-sec-hd{
  font-family:'IBM Plex Mono';font-size:11px;font-weight:700;
  color:var(--accent);padding:0 0 6px;display:flex;align-items:center;gap:6px;
  border-bottom:1px solid var(--border);margin-bottom:4px;
}
.full-floor-row{display:flex;align-items:flex-start;gap:3px}
.full-floor-lbl{
  font-family:'IBM Plex Mono';font-size:9px;color:var(--muted);
  width:18px;flex-shrink:0;padding-top:14px;text-align:right;
}
.full-slots{display:flex;gap:3px;align-items:flex-start;flex-wrap:nowrap}
.full-slots.mirrored{flex-direction:row-reverse}

/* ── 슬롯 렌더링 ── */
.slots-row{display:flex;flex-wrap:nowrap;gap:2px;align-items:center;overflow-x:auto;padding-bottom:2px}
.slots-row.mirrored{flex-direction:row-reverse}
.slots-row::-webkit-scrollbar{display:none}
.zgroup{display:inline-grid;grid-template-columns:48px 48px;grid-template-rows:24px 24px;gap:2px;flex-shrink:0;align-self:flex-start;border-radius:6px;overflow:hidden;height:50px;}
.zgroup.drawers{grid-template-columns:48px 48px;grid-template-rows:24px 24px;gap:2px;height:50px}

.slot{
  width:48px;height:48px;border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;
  font-family:'IBM Plex Mono';font-size:9px;font-weight:700;cursor:pointer;position:relative;
  border:1.5px solid transparent;flex-shrink:0;transition:all .08s;gap:1px;padding:2px;
}
.slot:hover{z-index:40;box-shadow:0 3px 10px rgba(0,0,0,.18);outline:2px solid var(--accent)}
.slot.dim{opacity:.1}
.slot.no-qty{opacity:.35}
.slot.UNUSED{opacity:.2;filter:grayscale(.7)}
.slot.EMPTY::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#e2e8f0;border:1px solid #94a3b8}
.qty-badge{position:absolute;top:1px;right:1px;z-index:10;pointer-events:none;
  background:#dc2626;color:#fff;font-size:7px;font-weight:800;line-height:1;
  padding:2px 3px;border-radius:3px;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.3)}

/* 기본: 빈 슬롯 연회색 */
.slot{background:#e8e4de;border-color:#d5cfc6;color:#78716c}
.slot.풀박스{width:calc(48px * 2 + 2px);height:48px}
.slot.흰색,.slot.노란색,.slot.서랍{width:48px;height:100%}
.slot.초소형{width:36px;height:48px}

/* 소재 있으면 소재색 */
.slot.mat-CN10{background:#facc15!important;border-color:#fcd34d!important;color:#78350f!important}
.slot.mat-CN20{background:#374151!important;border-color:#1f2937!important;color:#fff!important}
.slot.mat-RS40{background:#7dd3e8!important;border-color:#5bb8cc!important;color:#1a3a4a!important}
.slot.mat-RS20{background:#9ca3af!important;border-color:#6b7280!important;color:#fff!important}
.slot.mat-CM20{background:#d1d5db!important;border-color:#b0b5bc!important;color:#374151!important}

.slot.has-item:not([class*="mat-"]){background:#94a3b8!important;border-color:#64748b!important;color:#fff!important}

/* 장기미출고 (stale) */
.slot.stale{outline:2px solid #ef4444;outline-offset:-1px}
.stale-icon{position:absolute;top:1px;left:1px;font-size:7px;line-height:1;z-index:10;pointer-events:none;filter:drop-shadow(0 0 1px rgba(0,0,0,.3))}
.star-badge{position:absolute;bottom:1px;right:1px;z-index:10;pointer-events:none;
  background:#16a34a;color:#fff;font-size:7px;font-weight:800;line-height:1;
  padding:2px 3px;border-radius:3px;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.3)}
.popup-card .card-shipment{font-size:11px;color:var(--muted);margin-top:4px;padding-top:4px;border-top:1px dashed var(--border)}
.card-history{margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.card-history-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:4px}
.card-history-tbl{width:100%;border-collapse:collapse;font-size:10px}
.card-history-tbl th{background:var(--surface2);padding:3px 6px;text-align:left;font-weight:600;color:var(--muted)}
.card-history-tbl td{padding:3px 6px;border-bottom:1px solid var(--border)}
.card-history-tbl tr.hist-out td{color:#dc2626}
.card-history-tbl tr.hist-in td{color:#059669}

.slot-id{font-size:11px;line-height:1;font-weight:700;letter-spacing:.2px}
.slot-item{display:none}
.slot-material{font-size:9px;font-weight:800;opacity:.9;line-height:1}
.slot-loc{display:none}
.slot-order{display:none}

/* 툴팁 - JS로 제어 */
#slotTooltip{
  display:none;position:fixed;
  background:#1c1917;color:#fff;font-size:11px;padding:8px 12px;border-radius:8px;
  white-space:nowrap;z-index:9999;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.3);text-align:left;line-height:1.6;
  font-family:'IBM Plex Mono';
}
.slot-tip{display:none!important}

/* ── 소재 범례 ── */
.material-legend{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);
}
.mat-chip{
  display:flex;align-items:center;gap:5px;
  font-family:'IBM Plex Mono';font-size:11px;color:var(--text);
}
.mat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* has-item: 컴팩트에서는 기본 크기 유지 */

/* ── 슬롯 상세 바텀시트 ── */
.sheet-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
}
.sheet-backdrop.on{display:block}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:201;
  background:var(--bg);border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.12);
  padding:0 0 calc(20px + var(--safe-bottom));
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  max-height:90vh;overflow-y:auto;
}
.sheet.on{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-family:'IBM Plex Mono';font-size:15px;font-weight:700;color:var(--accent);padding:0 20px;margin-bottom:14px}
.sheet-field{padding:11px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.sheet-label{font-size:12px;color:var(--muted);flex-shrink:0;width:60px}
.sheet-value{font-size:13px;color:var(--text);text-align:right;flex:1}
.sheet-input,.sheet-select{
  flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:8px 10px;font-size:13px;outline:none;
  font-family:'Pretendard','IBM Plex Sans KR',sans-serif;text-align:right;
}
.sheet-input:focus,.sheet-select:focus{border-color:var(--accent)}
.sheet-actions{display:flex;gap:10px;padding:16px 20px 4px}
.sheet-btn{
  flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700;
  border:none;cursor:pointer;font-family:'IBM Plex Sans KR';
}
.sheet-btn.cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.sheet-btn.save{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(217,119,6,.3)}
.sheet-btn.queue{background:#6366f1;color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3)}

/* ── 카드 팝업 (슬롯 멀티아이템) ── */
.popup-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
}
.popup-backdrop.on{display:block}
.slot-popup{
  display:none;position:fixed;z-index:201;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--bg);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);
  width:92vw;max-width:420px;max-height:85vh;overflow-y:auto;
  padding:20px 16px calc(16px + var(--safe-bottom));
}
.slot-popup.on{display:block}
.popup-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding:0 4px;
}
.popup-title{font-family:'IBM Plex Mono';font-size:16px;font-weight:700;color:var(--accent)}
.popup-subtitle{font-size:12px;color:var(--muted);margin-left:6px;font-weight:400}
.popup-close{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:4px 10px;cursor:pointer;font-size:13px;color:var(--muted);
}
.popup-cards{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;
}
.popup-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px 10px 10px;position:relative;cursor:pointer;
  transition:box-shadow .15s,border-color .15s;
}
.popup-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md)}
.popup-card.editing{
  grid-column:1/-1;border-color:var(--accent);box-shadow:var(--shadow-md);cursor:default;
}
.popup-card .card-mat{
  font-family:'IBM Plex Mono';font-size:13px;font-weight:700;
  margin-bottom:4px;
}
.popup-card .card-item{font-size:12px;color:var(--text);margin-bottom:2px;word-break:break-all}
.popup-card .card-qty{font-size:11px;color:var(--muted)}
.popup-card .card-delete{
  position:absolute;top:4px;right:6px;
  background:none;border:none;font-size:14px;cursor:pointer;
  color:var(--muted);opacity:.5;transition:opacity .15s;padding:2px;line-height:1;
}
.popup-card .card-delete:hover{opacity:1;color:#dc2626}
.popup-card .card-badge{
  display:inline-block;font-size:9px;padding:1px 5px;border-radius:6px;
  font-weight:700;margin-bottom:4px;
}
/* card edit form inside popup-card.editing */
.card-edit-fields{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.card-edit-fields label{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.card-edit-fields input,.card-edit-fields select{
  flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:6px 8px;font-size:12px;outline:none;
  font-family:'Pretendard',sans-serif;
}
.card-edit-fields input:focus,.card-edit-fields select:focus{border-color:var(--accent)}
.card-edit-actions{display:flex;gap:6px;margin-top:8px}
.card-edit-actions button{
  flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;
  border:none;cursor:pointer;font-family:'Pretendard',sans-serif;
}
.card-edit-actions .card-save-btn{background:var(--accent);color:#fff}
.card-edit-actions .card-cancel-btn{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.card-edit-actions .card-queue-btn{background:#6366f1;color:#fff}
.popup-footer{display:flex;gap:10px;padding-top:6px}
.popup-footer button{
  flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:700;
  border:none;cursor:pointer;font-family:'Pretendard',sans-serif;
}
.popup-add-btn{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(217,119,6,.3)}
.popup-close-btn{background:var(--surface2);color:var(--muted);border:1px solid var(--border) !important}
/* 슬롯 멀티아이템 배지 */
.slot-badge{
  position:absolute;top:-4px;right:-4px;
  background:#dc2626;color:#fff;font-size:8px;font-weight:700;
  min-width:14px;height:14px;line-height:14px;text-align:center;
  border-radius:7px;padding:0 3px;z-index:2;
}

/* ── 인쇄 대기열 ── */
.pq-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.pq-toolbar-title{font-family:'IBM Plex Mono';font-size:14px;font-weight:700;color:var(--accent)}
.pq-count{font-size:12px;color:var(--muted)}
.pq-btn{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text);font-family:inherit;box-shadow:var(--shadow);
}
.pq-btn.print{background:var(--accent);color:#fff;border:none;font-weight:700;box-shadow:0 2px 8px rgba(217,119,6,.3)}
.pq-btn.clear{color:#dc2626;border-color:#fecaca}
.pq-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.pq-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start}
.pq-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;width:calc(50% - 4px);box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:4px;position:relative;
}
.pq-card-loc{font-family:'IBM Plex Mono';font-size:15px;font-weight:800;color:var(--accent)}
.pq-card-item{font-size:13px;font-weight:700;color:var(--text);word-break:break-all}
.pq-card-mat{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;color:#fff;width:fit-content}
.pq-card-del{
  position:absolute;top:6px;right:8px;background:none;border:none;
  font-size:16px;cursor:pointer;color:var(--muted);padding:2px 6px;
}
.pq-card-del:hover{color:#dc2626}
/* 대기열 인쇄 라벨 (화면+인쇄 공통) */
.pq-print-area{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
.pq-print-area .pq-label{
  display:flex;align-items:stretch;
  border:1.5px solid #555;border-radius:3px;
  margin:1mm;page-break-inside:avoid;
  width:140mm;min-width:140mm;max-width:140mm;height:28mm;overflow:hidden;background:#fff;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;
}
/* 1: 위치 정사각형 */
.pq-print-area .pq-label-loc{
  width:28mm;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:#f5f3f0;border-right:1px solid #ddd;
  font-family:Consolas,'Courier New',monospace;font-size:16pt;font-weight:900;
  color:#111;letter-spacing:0.5px;
}
/* 2: QR 정사각형 */
.pq-print-area .pq-label-qr{
  width:28mm;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding:2mm;border-right:1px solid #ddd;background:#fff;
}
.pq-print-area .pq-label-qr img,.pq-print-area .pq-label-qr canvas{width:22mm!important;height:22mm!important}
/* 3: 치수+소재 (78mm 고정 - 888.88*888.88*888.88 기준) */
.pq-print-area .pq-label-info{
  width:78mm;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;
  padding:2mm 4mm;
}
.pq-print-area .pq-label-item{
  font-family:Consolas,'Courier New',monospace;font-size:16pt;font-weight:900;
  color:#111;white-space:nowrap;line-height:1.2;
}
.pq-print-area .pq-label-mat{
  font-family:Consolas,monospace;font-size:13pt;font-weight:800;
  color:#555;margin-top:1.5mm;
}
/* 오른쪽 끝: 소재 색상 바 */
.pq-print-area .pq-label-cb{
  width:6mm;flex-shrink:0;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;
}

/* ── 인쇄 탭 모드전환 ── */
.pq-tabs{display:flex;gap:4px;margin-bottom:12px}
.pq-tab{
  flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;color:var(--muted);
}
.pq-tab.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(217,119,6,.3)}
.pq-select{
  font-family:inherit;font-size:12px;padding:7px 12px;
  border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;color:var(--text);
}
.pq-so{display:flex;gap:3px}
.pq-sz{font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--surface)}
.pq-sz input{display:none}
.pq-sz input:checked+span{color:var(--accent);font-weight:700}

/* ── 전체 라벨 프리뷰 (C안: 2단 분할) ── */
.lbl-preview{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding-top:8px}
.lbl-card{
  border:1.5px solid #ccc;border-radius:5px;
  display:flex;align-items:stretch;
  overflow:hidden;background:#fff;page-break-inside:avoid;
}
.lbl-card.lg{width:100mm;height:38mm}
.lbl-card.md{width:75mm;height:28mm}
.lbl-card.sm{width:55mm;height:22mm}

/* 좌측: 소재색 배경 + 큰 위치 */
.lbl-left{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;color:#fff;
}
.lbl-card.lg .lbl-left{width:40mm;padding:2mm}
.lbl-card.md .lbl-left{width:30mm;padding:1.5mm}
.lbl-card.sm .lbl-left{width:22mm;padding:1mm}
.lbl-loc{font-family:Consolas,'Courier New',monospace;font-weight:900;line-height:1;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.lbl-card.lg .lbl-loc{font-size:24pt}
.lbl-card.md .lbl-loc{font-size:17pt}
.lbl-card.sm .lbl-loc{font-size:12pt}
.lbl-matname{font-family:Consolas,monospace;font-weight:700;opacity:.85;line-height:1;margin-top:1mm}
.lbl-card.lg .lbl-matname{font-size:10pt}
.lbl-card.md .lbl-matname{font-size:8pt}
.lbl-card.sm .lbl-matname{font-size:6.5pt}

/* 우측: 흰 배경 + 치수 + QR */
.lbl-right{
  flex:1;display:flex;align-items:center;gap:2mm;min-width:0;
  border-left:1.5px solid #e0e0e0;
}
.lbl-card.lg .lbl-right{padding:2mm 3mm}
.lbl-card.md .lbl-right{padding:1.5mm 2.5mm}
.lbl-card.sm .lbl-right{padding:1mm 1.5mm}
.lbl-info{flex:1;display:flex;flex-direction:column;justify-content:center;gap:1mm;min-width:0}
.lbl-item{font-family:Consolas,monospace;font-weight:800;color:#111;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbl-card.lg .lbl-item{font-size:14pt}
.lbl-card.md .lbl-item{font-size:10pt}
.lbl-card.sm .lbl-item{font-size:7.5pt}
.lbl-type{font-family:Consolas,monospace;color:#888;line-height:1}
.lbl-card.lg .lbl-type{font-size:8pt}
.lbl-card.md .lbl-type{font-size:6.5pt}
.lbl-card.sm .lbl-type{font-size:5.5pt}
.lbl-qr{flex-shrink:0;display:flex;align-items:center;justify-content:center}
.lbl-card.lg .lbl-qr{width:26mm;height:26mm}
.lbl-card.md .lbl-qr{width:18mm;height:18mm}
.lbl-card.sm .lbl-qr{width:14mm;height:14mm}

@media print{
  .lbl-preview{padding:0;gap:1.5mm;justify-content:flex-start}
  .lbl-card{border:1px solid #999}
}

/* ── 공지 토스트 ── */
.toast{
  position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-md);
  padding:10px 18px;font-size:13px;color:var(--text);font-family:'IBM Plex Mono';
  z-index:300;white-space:nowrap;display:none;
  animation:toastout 2s forwards;
}
@keyframes toastout{0%{opacity:1;transform:translateX(-50%) translateY(0)}
  70%{opacity:1;transform:translateX(-50%) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* ── 검색 결과 패널 ── */
.search-result-panel{
  position:fixed;left:0;right:0;bottom:64px;
  background:var(--bg);overflow-y:auto;
  z-index:95;
  display:none;
  border-top:1px solid var(--border);
}
.search-result-panel.on{display:block}
.search-result-header{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:10px 16px 8px;box-shadow:0 1px 4px rgba(0,0,0,.06);
  font-family:'IBM Plex Mono';font-size:12px;color:var(--muted);
}
.result-card{
  margin:8px 16px 0;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow);
}
.result-card:active{border-color:var(--accent)}
.result-loc{display:flex;flex-direction:column;gap:3px;flex:1;}
.result-path{font-family:'IBM Plex Mono';font-size:13px;font-weight:700;color:var(--accent)}
.result-item{font-size:13px;color:var(--text)}
.result-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.result-status{
  font-size:11px;font-family:'IBM Plex Mono';font-weight:700;
  padding:4px 9px;border-radius:8px;flex-shrink:0;
}
.result-status.IN{background:rgba(16,185,129,.15);color:#059669;font-weight:700}
.result-status.EMPTY{background:rgba(148,163,184,.15);color:#64748b}
.result-status.UNUSED{background:rgba(0,0,0,.06);color:#94a3b8}
.no-results{
  text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;
}
.no-results-icon{font-size:32px;margin-bottom:12px}

/* ── 빈슬롯 추천 모드 ── */
.slot.recommend{
  animation:recommend-pulse 1.2s ease-in-out infinite;
  z-index:10;position:relative;
}
@keyframes recommend-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.6),var(--shadow)}
  50%{box-shadow:0 0 0 6px rgba(16,185,129,.0),var(--shadow)}
}
.slot.recommend::before{
  content:"★";position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  font-size:11px;color:#10b981;background:#fff;border-radius:50%;
  width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.15);line-height:16px;text-align:center;
}
.slot.dim-recommend{opacity:.18;filter:grayscale(.5)}

/* ── 추천 패널 ── */
.recommend-panel{
  position:fixed;left:0;right:0;bottom:64px;
  background:var(--bg);border-top:2px solid #10b981;
  z-index:95;display:none;overflow-y:auto;
}
.recommend-panel.on{display:block}
.recommend-header{
  padding:14px 20px 10px;
  display:flex;align-items:center;justify-content:space-between;
}
.recommend-title{font-family:'IBM Plex Mono';font-size:13px;font-weight:700;color:#065f46}
.recommend-close{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:4px 10px;font-size:12px;cursor:pointer;color:var(--muted);
}
.recommend-chips{
  display:flex;gap:6px;flex-wrap:wrap;padding:0 20px 12px;
}
.rec-chip{
  background:rgba(16,185,129,.1);border:1.5px solid rgba(16,185,129,.3);
  border-radius:20px;padding:5px 12px;font-size:11px;font-family:'IBM Plex Mono';
  color:#065f46;cursor:pointer;transition:all .15s;
}
.rec-chip:hover,.rec-chip.on{background:#10b981;border-color:#10b981;color:#fff}
.rec-list{padding:0 20px 16px;display:flex;flex-direction:column;gap:6px}
.rec-card{
  background:var(--surface);border:1.5px solid rgba(16,185,129,.4);
  border-radius:12px;padding:12px 16px;cursor:pointer;
  display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);
  transition:all .15s;
}
.rec-card:hover{border-color:#10b981;transform:translateY(-1px);box-shadow:var(--shadow-md)}
.rec-rank{
  font-family:'IBM Plex Mono';font-size:18px;font-weight:800;
  color:#10b981;width:28px;flex-shrink:0;text-align:center;
}
.rec-info{flex:1}
.rec-loc{font-family:'IBM Plex Mono';font-size:13px;font-weight:700;color:var(--text)}
.rec-reason{font-size:11px;color:var(--muted);margin-top:2px}
.rec-type{
  font-size:10px;font-family:'IBM Plex Mono';padding:3px 8px;
  border-radius:8px;background:var(--surface2);color:var(--muted);
}

/* ── 검색바 확장 - 필터 바 ── */
.search-filter-bar{
  display:none;gap:6px;overflow-x:auto;padding:8px 16px 0;scrollbar-width:none;
}
.search-filter-bar.on{display:flex}
.search-filter-bar::-webkit-scrollbar{display:none}
.sf-chip{
  flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:5px 12px;font-size:11px;font-family:'IBM Plex Mono';
  color:var(--muted);cursor:pointer;white-space:nowrap;box-shadow:var(--shadow);
}
.sf-chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.sf-chip.empty-only{border-color:#10b981;color:#065f46}
.sf-chip.empty-only.on{background:#10b981;border-color:#10b981;color:#fff}

/* ── 추천 트리거 버튼 ── */
.recommend-btn{
  background:linear-gradient(135deg,#10b981,#059669);
  border:none;border-radius:10px;padding:7px 12px;font-size:12px;
  cursor:pointer;color:#fff;font-family:'IBM Plex Mono';font-weight:700;
  display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(16,185,129,.3);
  white-space:nowrap;
}

/* ── 스프레드시트 뷰 ── */
#panel-table{overflow:auto;}
.table-toolbar{
  display:flex;align-items:center;gap:8px;padding:12px 16px 8px;
  position:sticky;top:0;background:var(--bg);z-index:10;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.table-toolbar-title{font-family:'IBM Plex Mono';font-size:13px;font-weight:700;color:var(--text);flex:1}
.tbl-btn{
  background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  padding:6px 12px;font-size:12px;font-family:'IBM Plex Mono';cursor:pointer;
  color:var(--text);display:flex;align-items:center;gap:5px;box-shadow:var(--shadow);
  transition:all .15s;white-space:nowrap;
}
.tbl-btn:hover{border-color:var(--accent);color:var(--accent)}
.tbl-btn.pdf-btn{
  background:linear-gradient(135deg,#ef4444,#dc2626);border-color:#dc2626;
  color:#fff;box-shadow:0 2px 8px rgba(239,68,68,.3);
}
.tbl-btn.pdf-btn:hover{background:linear-gradient(135deg,#dc2626,#b91c1c)}
.tbl-btn.pdf-btn:disabled{opacity:.4;cursor:not-allowed}
.tbl-selected-count{
  font-family:'IBM Plex Mono';font-size:11px;color:#059669;font-weight:700;
  background:rgba(16,185,129,.1);padding:4px 10px;border-radius:12px;
  display:none;
}
.tbl-selected-count.on{display:block}

.wh-table-wrap{overflow:auto;padding:0 8px 80px;}
.wh-table{
  width:100%;border-collapse:collapse;
  font-family:'IBM Plex Mono';font-size:12px;
  min-width:700px;
}
.wh-table th{
  background:var(--surface2);color:var(--muted);
  padding:8px 12px;text-align:left;font-size:11px;font-weight:600;
  border-bottom:2px solid var(--border);position:sticky;top:0;
  cursor:pointer;user-select:none;white-space:nowrap;
}
.wh-table th:hover{color:var(--accent)}
.wh-table th .sort-icon{opacity:.4;margin-left:3px}
.wh-table th.sorted .sort-icon{opacity:1;color:var(--accent)}
.wh-table td{
  padding:9px 12px;border-bottom:1px solid var(--border);
  color:var(--text);vertical-align:middle;
}
.wh-table tr{cursor:pointer;transition:background .1s}
.wh-table tr:hover td{background:var(--surface2)}
.wh-table tr.selected td{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2)}
.wh-table tr.selected td:first-child{border-left:3px solid #10b981}
.tbl-state{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;
  white-space:nowrap;
}
.tbl-state.IN{background:rgba(16,185,129,.12);color:#065f46}
.tbl-state.EMPTY{background:rgba(148,163,184,.12);color:#475569}
.tbl-state.UNUSED{background:rgba(0,0,0,.06);color:#94a3b8}
.tbl-mat{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;color:#fff;
}
.tbl-checkbox{
  width:16px;height:16px;cursor:pointer;accent-color:#10b981;
}

/* ── PDF 인쇄 레이아웃 ── */
#printArea{display:none}

/* ── 모바일 최적화 ── */
@media (max-width: 768px) {
  .full-warehouse { padding: 8px; min-width: unset; }
  /* overview(지도)에서는 overflow:hidden, 상세뷰에서는 auto */
  #panel-full { overflow: hidden; }
  #panel-full.detail-active { overflow: auto!important; }
  #panel-full.detail-active #mapViewport { overflow: auto!important; }
  #panel-full.detail-active #mapCanvas { transform: none!important; width: 100%!important; }

  /* 슬롯 크기 축소 */
  .slot { width: 80px!important; min-width: 80px!important; max-width: 80px!important; height: 90px!important; font-size: 9px!important; }
  .slot.has-item { width: 80px!important; min-width: 80px!important; max-width: 80px!important; }
  .slot.풀박스 { width: calc(80px * 2 + 2px)!important; min-width: calc(80px * 2 + 2px)!important; max-width: calc(80px * 2 + 2px)!important; }
  .zgroup { grid-template-columns: 80px 80px!important; grid-template-rows: 44px 44px!important; height: auto!important; }
  .zgroup .slot { height: 44px!important; }
  .slot-id { font-size: 10px!important; }
  .slot-item { font-size: 8px!important; -webkit-line-clamp: 2; }
  .slot-material { font-size: 10px!important; }

function parseTSV(tsv){
  const lines = tsv.trim().split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  if(lines.length<=1) return [];
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const line = lines[i];
    let cells = line.includes('\t') ? line.split('\t') : line.split(/\s+/);
    // 기존 TSV 컬럼이 많아도 필요한 값만 사용 (dan/chapter는 무시)
    while(cells.length < 8) cells.push('');
    const [section,floor,_dan,order,_chapter,saved,status,type] = cells.map(x=>(x??'').trim());
    rows.push({
      section: section || '',
      floor: floor ? Number(floor) : null,
      order: order ? Number(order) : null,
      saved: saved ? Number(saved) : 0,
      // migrate: ACTIVE→'' HOLD→UNUSED
      status: status || '',
      type: type || ''
    });
  }
  return rows.filter(r=>r.section && r.floor && r.order);
}

function keyOf(r){
  return `${r.section}|${Number(r.floor)}|${Number(r.order)}`;
}
const baseRows=parseTSV(TSV_DATA);
let data=baseRows.map((r,idx)=>({
  id:idx,
  key:keyOf(r),
  section:r.section,
  floor:r.floor,
  order:r.order,
  saved:r.saved??0,
  status:r.status==='HOLD'?'UNUSED':r.status==='ACTIVE'?'':r.status??'',
  type:r.type??'',
  item:'',
  material:'',
  qty:'',
  inDate:'',
  memo:''
}));

/* ── 장기미출고 (shipment) 데이터 ── */
let shipmentData = {};

function getStaleInfo(d){
  if(!d || !d.item) return {stale:false, top100:false};
  const baseMat = (d.material||'').split(/[(\s]/)[0];
  const key = baseMat + '|' + d.item.toLowerCase();
  const info = shipmentData[key];
  const today = new Date();
  today.setHours(0,0,0,0);
  const top100 = info && info.top100 ? info.top100 : false;
  if(!info){
    // 입출고 이력 자체가 없음
    return {stale:true, days:-1, lastOut:'', lastIn:'', top100};
  }
  const lastIn = info.lastIn||'';
  const lastOut = info.lastOut||'';
  // 마지막 입고/출고 중 더 최근 날짜 기준
  const lastAny = [lastOut, lastIn].filter(Boolean).sort().pop() || '';
  let daysSinceLast = -1;
  if(lastAny){
    const lastDate = new Date(lastAny);
    daysSinceLast = Math.floor((today - lastDate)/(1000*60*60*24));
  }
  // 1000일 이상 입출고 둘 다 없으면 stale
  const stale = !lastAny || daysSinceLast >= 1000;
  return {stale, days: daysSinceLast, lastOut, lastIn, top100};
}

let qtyTop100 = new Set(); // 수량 top100 키 셋 (material|item)
function buildQtyTop100(){
  const qtyMap = {};
  data.forEach(d=>{
    if(!d.item || !d.qty) return;
    const baseMat = (d.material||'').split(/[(\s]/)[0];
    const key = baseMat + '|' + d.item.toLowerCase();
    const q = parseInt(d.qty)||0;
    if(q > (qtyMap[key]||0)) qtyMap[key] = q;
  });
  const sorted = Object.entries(qtyMap).sort((a,b)=>b[1]-a[1]);
  qtyTop100 = new Map(sorted.slice(0,100).map(([k,v],i)=>[k,i+1]));
}

let shipmentHistory = null; // lazy load

async function loadShipmentData(){
  try{
    // 캐시 확인
    const cached = localStorage.getItem('shipmentDataCache');
    const cacheTime = localStorage.getItem('shipmentDataTime');
    if(cached && cacheTime && Date.now() - Number(cacheTime) < 3600000){
      shipmentData = JSON.parse(cached);
      buildQtyTop100();
      renderAll();
      return;
    }
    const res = await fetch('shipment_data.json');
    if(!res.ok) throw new Error('fetch failed');
    shipmentData = await res.json();
    localStorage.setItem('shipmentDataCache', JSON.stringify(shipmentData));
    localStorage.setItem('shipmentDataTime', String(Date.now()));
    buildQtyTop100();
    renderAll();
  }catch(e){
    console.warn('shipment_data.json 로드 실패:', e.message);
    shipmentData = {};
  }
}

async function loadShipmentHistory(){
  if(shipmentHistory) return shipmentHistory;
  try{
    const res = await fetch('shipment_history.json');
    if(res.ok) shipmentHistory = await res.json();
    else shipmentHistory = {};
  }catch(e){ shipmentHistory = {}; }
  return shipmentHistory;
}

// 구글 시트에서 데이터 불러오기
async function loadFromSheet(){
  showLoading('⏳ 서버에서 불러오는 중...');
  try{
    const res=await fetch(API_URL+'?action=getAll');
    const json=await res.json();

    // baseRows를 loc 기준으로 인덱싱 (type 등 레이아웃 정보 참조용)
    const baseByLoc=new Map(baseRows.map(r=>[`${r.section}|${r.floor}|${r.order}`,r]));

    if(json.data && json.data.length>0){
      // ★ 핵심: 구글시트 행만 data로 구성 (시트에 없으면 표시 안 함)
      data = json.data.map((s, idx)=>{
        const loc=`${s.section}|${s.floor}|${s.order}`;
        const base=baseByLoc.get(loc); // HTML 레이아웃 참조
        return {
          id: idx,
          key: keyOf(s),
          section: s.section||'',
          floor: Number(s.floor)||1,
          order: Number(s.order)||1,
          type: s.type||base?.type||'반박스',
          status: s.status==='HOLD'?'UNUSED':s.status==='ACTIVE'?'':s.status||'',
          item: s.item!=null?String(s.item).trim():'',
          material: s.material!=null?String(s.material).trim():'',
          qty: s.qty!=null&&s.qty!==''?s.qty:'',
          inDate: s.inDate||'',
          memo: s.memo!=null?String(s.memo).trim():'',
          saved: s.saved!=null&&s.saved!==''?Number(s.saved):0,
        };
      });
      hideLoading();
      showToast('✅ 서버 데이터 로드 완료 · '+data.length+'개 슬롯');
    } else {
      // 시트가 비어있으면 baseRows 사용 (초기 세팅)
      hideLoading();
      showToast('📋 시트가 비어있어요 · 기본 레이아웃 표시');
      data = baseRows.map((r,idx)=>({
        id:idx, key:keyOf(r),
        section:r.section, floor:r.floor, order:r.order,
        saved:0, status:'', type:r.type??'반박스',
        item:'', material:'', qty:'', inDate:'', memo:''
      }));
    }
    // 캐시 저장
    try{ localStorage.setItem('wh_cache_v1', JSON.stringify(data)); }catch(e){}
    renderAll();
    if(searchQ||emptyOnly||activeMatFilter||staleOnly) renderFilteredResults();
    handleQRParam();
  }catch(err){
    hideLoading();
    showToast('⚠️ 서버 연결 실패 · 캐시 사용');
    loadFromCache();
    renderAll();
  }
}

// localStorage 캐시 (오프라인 대비)
function loadFromCache(){
  try{
    const raw=localStorage.getItem('wh_cache_v1');
    if(!raw)return;
    const arr=JSON.parse(raw);
    // 캐시도 시트 기준: 캐시에 있는 행만 표시
    if(arr && arr.length>0){
      data=arr.map((d,idx)=>({...d,id:idx}));
    }
  }catch(e){}
}

// 슬롯 하나를 구글 시트에 저장
async function persist(slot){
  // 낙관적 업데이트: UI는 즉시 반영
  try{ localStorage.setItem('wh_cache_v1', JSON.stringify(data)); }catch(e){}
  try{
    // ✅ POST 방식 (URL 길이 제한/저장 누락 방지)
    const payload = {
      action: 'save',
      data: {
        key: slot.key,
        section: slot.section,
        floor: slot.floor,
        order: slot.order,
        saved: slot.saved,
        status: slot.status,
        type: slot.type,
        item: slot.item,
        qty: slot.qty,
        inDate: slot.inDate,
        memo: slot.memo,
        material: slot.material
      }
    };
    await fetch(API_URL, {
      method:'POST',
      // ✅ 헤더를 지정하지 않으면 text/plain으로 전송되어 CORS preflight(OPTIONS) 없이 전달됩니다.
      body: JSON.stringify(payload)
    });
  }catch(err){
    showToast('⚠️ 서버 저장 실패 · 로컬에만 저장됨');
  }
}

/* ── 저장 ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';t.style.animation='none';
  void t.offsetWidth;t.style.animation='toastout 2s forwards';
  setTimeout(()=>t.style.display='none',2100);
}
function exportData(){
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='warehouse_data.json';a.click();
  URL.revokeObjectURL(url);
  showToast('📤 내보내기 완료');
}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const arr=JSON.parse(ev.target.result);
      const byKey=new Map(arr.map(x=>[x.key,x]));
      data=data.map(d=>byKey.has(d.key)?({...d,...byKey.get(d.key)}):d);
      // 전체 변경된 슬롯 서버에 올리기
      showToast('⏳ 서버에 업로드 중...');
      fetch(API_URL,{method:'POST',body:JSON.stringify({action:'saveAll',data:data.filter(d=>d.item||d.status||d.saved||d.memo||d.material||d.qty!==''||d.inDate).map(d=>({key:d.key,section:d.section,floor:d.floor,order:d.order,saved:d.saved,status:d.status,type:d.type,item:d.item,qty:d.qty,inDate:d.inDate,memo:d.memo,material:d.material}))})})
        .then(()=>showToast('✅ 서버 업로드 완료'))
        .catch(()=>showToast('⚠️ 서버 업로드 실패'));
      try{localStorage.setItem('wh_cache_v1',JSON.stringify(data));}catch(e){}
      renderAll();
    }catch(err){alert('파일 형식 오류: '+err.message);}
  };
  reader.readAsText(file);
  e.target.value='';
}

/* ── 탭 / 패널 ── */
const SECTIONS_ORDER='ABCDEFGHIJKLMNOP';
function isEven(sec){
  if(!sec) return false; // null/undefined 방어
  const idx=SECTIONS_ORDER.indexOf(String(sec).toUpperCase());
  return idx>=0 && idx%2===1;
}

let currentTab='map';
let currentSection=null;
let prevTab=null;

function switchTab(name){
  document.querySelectorAll('.tabbar-item').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+name).classList.add('on');
  currentTab=name;
  if(name==='full')renderFullView();
  if(name==='table')renderTable();
  if(name==='queue')renderPrintQueue();
}

function openSection(sec){
  prevTab=currentTab;
  currentSection=sec;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-detail').classList.add('on');
  document.getElementById('detailTitle').textContent='섹션 '+sec;
  renderDetail(sec);
  // mirrored(짝수) 섹션은 1번 박스가 오른쪽이므로 스크롤을 오른쪽 끝으로
  if(isEven(sec)){
    setTimeout(()=>{
      const rows=document.querySelectorAll('#detailContent .slots-row.mirrored');
      rows.forEach(r=>{
        const parent=r.closest('.floor-block')||r.parentElement;
        if(parent) parent.scrollLeft=parent.scrollWidth;
      });
      const detail=document.getElementById('detailContent');
      if(detail) detail.scrollLeft=detail.scrollWidth;
      // 뷰포트도 오른쪽으로
      const panel=document.getElementById('panel-detail');
      if(panel) panel.scrollLeft=panel.scrollWidth;
    },100);
  }
}

function goBack(){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+(prevTab||'full')).classList.add('on');
  if((prevTab||'full')==='full')renderFullView();
  if(prevTab==='table')renderTable();
}

function goBackTab(){
  // 그룹 상세뷰면 전체뷰로, 아니면 이전 탭으로
  if(fullViewGroup){
    fullViewGroup=null;
    switchTab('full');
  } else if(currentTab==='table'||currentTab==='queue'){
    switchTab('full');
  } else {
    switchTab('full');
  }
}

let searchQ='';

function onSearch(){

function clearSearch(){

  searchQ='';
  document.getElementById('searchClear').style.display='none';
  closeSearchResults();
}
function closeSearchResults(){
  document.getElementById('searchResultPanel').classList.remove('on');

  renderList();
}

function renderSearchResults(){
  const panel=document.getElementById('searchResultPanel');
  const list=document.getElementById('searchResultList');
  const header=document.getElementById('searchResultHeader');
  list.innerHTML='';

  // 매칭 슬롯: 섹션명 OR 치수 OR 메모
  const matches=data.filter(d=>
    d.section.toUpperCase().includes(searchQ)||
    (d.item||'').toUpperCase().includes(searchQ)||
    (d.material||'').toUpperCase().includes(searchQ)||
    (d.memo||'').toUpperCase().includes(searchQ)
  );

  // 치수 정확 매칭 우선 정렬
  matches.sort((a,b)=>{
    const aExact=(a.item||'').toUpperCase()===searchQ;
    const bExact=(b.item||'').toUpperCase()===searchQ;
    if(aExact&&!bExact)return -1;
    if(!aExact&&bExact)return 1;
    // 그 다음 품목 있는것 우선
    const aHas=!!(a.item);
    const bHas=!!(b.item);
    if(aHas&&!bHas)return -1;
    if(!aHas&&bHas)return 1;
    return a.section.localeCompare(b.section)||(a.floor-b.floor)||(a.order-b.order);
  });

  // 치수로 검색한 경우 (섹션 단독 검색 아닐때) 품목없는 슬롯은 제외
  const isItemSearch=!('ABCDEFGHIJKLMNOP'.includes(searchQ)&&searchQ.length===1);
  const filtered=isItemSearch
    ? matches.filter(d=>(d.item||'').toUpperCase().includes(searchQ)||(d.memo||'').toUpperCase().includes(searchQ))
    : matches;

  header.innerHTML=filtered.length>0
    ? `<b>"${document.getElementById('searchInput').value}"</b> 검색결과 · <b style="color:var(--text)">${filtered.length}개</b> 슬롯`
    : `<b>"${document.getElementById('searchInput').value}"</b> 검색결과`;

  if(filtered.length===0){
    // 혹시 data에 item이 하나라도 있는지 확인
    const hasAnyItem = data.some(d=>d.item);
    list.innerHTML=`<div class="no-results">
      <div>🔍</div>
      <b style="color:var(--text)">"${document.getElementById('searchInput').value}"</b> 검색 결과 없음
      <br><span style="font-size:12px;margin-top:8px;display:block;color:var(--muted)">
        ${hasAnyItem ? '등록된 품목 중 일치하는 항목이 없어요' : '아직 치수가 등록된 슬롯이 없어요.<br>슬롯을 탭해서 치수를 입력해주세요'}
      </span>
    </div>`;
    return;
  }

  // 섹션별 그룹핑 표시
  const bySection={};
  filtered.forEach(d=>{
    if(!bySection[d.section])bySection[d.section]=[];
    bySection[d.section].push(d);
  });

  Object.entries(bySection).sort(([a],[b])=>a.localeCompare(b)).forEach(([sec,items])=>{
    // 섹션 구분선
    const secLabel=document.createElement('div');
    secLabel.style.cssText='padding:14px 16px 4px;font-family:"IBM Plex Mono";font-size:11px;color:var(--muted);';
    secLabel.textContent='섹션 '+sec;
    list.appendChild(secLabel);

    items.forEach(d=>{
      const card=document.createElement('div');
      card.className='result-card';

      const statusCls=getSlotState(d);
      const statusLbl={'IN':'🟢 입고','EMPTY':'⬜ 공실','UNUSED':'🔴 미사용'}[getSlotState(d)]||'';
      const typeColor={'반박스':'#818cf8','풀박스':'#c084fc','흰색':'#94a3b8','노란색':'#fbbf24','초소형':'#22d3ee','서랍':'#f472b6'}[d.type]||'#536080';

      // 위치 경로: 섹션A · 1층 · 거리#3
      const locPath=`섹션${d.section} · ${d.floor}층 · #${d.order}`;

      card.innerHTML=`
        <div class="result-loc">
          <div class="result-path">${locPath}</div>
          ${d.item?`<div class="result-item">📦 ${d.item}${d.qty!==''?' · '+d.qty+'개':''}</div>`:'<div class="result-item" style="color:var(--muted)">품목 미등록</div>'}
          ${d.material?`<div style="font-size:11px;font-family:IBM Plex Mono;margin-top:2px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${'CN10'===d.material?'#facc15':'CN20'===d.material?'#374151':'RS40'===d.material?'#0d9488':'RS20'===d.material?'#6b7280':'#a07850'};margin-right:4px;vertical-align:middle"></span>${d.material}</div>`:'' }
          ${d.material?`<div class="result-item" style="color:#94a3b8">🧵 ${d.material}</div>`:''}
          <div class="result-meta">
            <span style="color:${typeColor}">■ ${d.type||'유형미지정'}</span>
            ${d.inDate?`<span>입고: ${d.inDate}</span>`:''}
            ${d.memo?`<span>💬 ${d.memo}</span>`:''}
          </div>
        </div>
        <div class="result-status ${statusCls}">${statusLbl}</div>
      `;

      // 클릭시 해당 섹션 상세로 이동 + 슬롯 편집시트 오픈
      card.addEventListener('click',()=>{
        closeSearchResults();
        document.getElementById('searchInput').value='';
        searchQ='';
        document.getElementById('searchClear').style.display='none';
        // 섹션 상세 열기
        setTimeout(()=>{
          openSection(d.section);
          // 약간 딜레이 후 해당 슬롯 시트 열기
          setTimeout(()=>openSheet(d.id), 300);
        }, 50);
      });

      list.appendChild(card);
    });
  });
}


/* ── 상태 헬퍼 ── */
function getSlotState(d){
  if(d.item) return 'IN';
  if(d.status==='UNUSED') return 'UNUSED';
  return 'EMPTY';
}

// 같은 key의 데이터를 하나로 합쳐서 대표 행만 반환 (유니크 슬롯 목록)
function dedupeByKey(arr){
  const seen=new Set();
  return arr.filter(d=>{
    if(seen.has(d.key)) return false;
    seen.add(d.key);
    return true;
  });
}

function matchesFilter(d){
  if(currentFilter==='all')return true;
  if(currentFilter==='IN')return getSlotState(d)==='IN';
  if(currentFilter==='EMPTY')return getSlotState(d)==='EMPTY';
  if(currentFilter==='UNUSED')return getSlotState(d)==='UNUSED';
  return true;
}
function matchesSearch(d){
  if(!searchQ)return true;
  return d.section.toUpperCase().includes(searchQ)||(d.item||'').toUpperCase().includes(searchQ);
}

/* ── 통계 ── */
function renderStats(){
  const total=data.length;
  const inCnt=data.filter(d=>getSlotState(d)==='IN').length;
  const emptyCnt=data.filter(d=>getSlotState(d)==='EMPTY').length;
  const unusedCnt=data.filter(d=>getSlotState(d)==='UNUSED').length;
  document.getElementById('statsRow').innerHTML=[
    ['#38bdf8','전체',total],
    ['#10b981','🟢 입고',inCnt],
    ['#94a3b8','⬜ 공실',emptyCnt],
    ['#d1d5db','🔴 미사용',unusedCnt],
  ].map(([c,l,v])=>`<div class="stat-chip"><span class="sdot" style="background:${c}"></span>${l}<b>${v}</b></div>`).join('');
}

/* ── 조감도 ── */
function renderOverview(){
  renderStats();
  const grid=document.getElementById('overviewGrid');
  grid.innerHTML='';
  const sections=[...new Set(data.map(d=>d.section))].sort();
  const filtered=sections.filter(sec=>{
    if(searchQ&&!sec.toUpperCase().includes(searchQ)){
      if(!data.some(d=>d.section===sec&&matchesSearch(d)))return false;
    }
    return true;
  });

  for(let i=0;i<filtered.length;i+=2){
    const secA=filtered[i],secB=filtered[i+1];
    const block=document.createElement('div');
    block.className='aisle-block';
    const aisleN=Math.floor(i/2)+1;
    block.innerHTML=`<div class="aisle-label">통로 ${aisleN}</div>`;
    const secGrid=document.createElement('div');
    secGrid.className='aisle-sections';

    [secA,secB].forEach(sec=>{
      if(!sec){secGrid.appendChild(document.createElement('div'));return;}
      const sd=data.filter(d=>d.section===sec);
      const floors=[...new Set(sd.map(d=>d.floor))].sort((a,b)=>b-a);
      const even=isEven(sec);
      const act=sd.filter(d=>getSlotState(d)==='IN').length;
      const hld=sd.filter(d=>getSlotState(d)==='EMPTY').length;
      const none=sd.filter(d=>getSlotState(d)==='UNUSED').length;

      const box=document.createElement('div');
      box.className='ov-sec'+(even?' mirror':'');

      let barsHTML='';
      floors.forEach(fl=>{
        const fd=sd.filter(d=>d.floor===fl);
        const fT=fd.length,fA=fd.filter(d=>getSlotState(d)==='IN').length,
          fH=fd.filter(d=>getSlotState(d)==='EMPTY').length,fN=fd.filter(d=>getSlotState(d)==='UNUSED').length;
        const pA=fT?(fA/fT*100):0,pH=fT?(fH/fT*100):0,pN=fT?(fN/fT*100):0;
        const dir=even?'row-reverse':'row';
        barsHTML+=`<div class="ov-fbar">
          <div class="ov-fbar-lbl">${fl}F</div>
          <div class="ov-fbar-track" style="flex-direction:${dir}">
            <div class="ov-fbar-active" style="width:${pA}%"></div>
            <div class="ov-fbar-hold" style="width:${pH}%"></div>
            <div class="ov-fbar-none" style="width:${pN}%"></div>
          </div>
          <div class="ov-fbar-cnt">${fT}</div>
        </div>`;
      });

      box.innerHTML=`
        <div class="ov-sec-name">섹션 ${sec}</div>
        <div class="ov-chips">
          ${act>0?`<span class="ov-chip in">🟢${act}</span>`:''}
          ${hld>0?`<span class="ov-chip empty">⬜${hld}</span>`:''}
          ${none>0?`<span class="ov-chip unused">🔴${none}</span>`:''}
        </div>
        <div class="ov-floor-bars">${barsHTML}</div>`;

      box.addEventListener('click',()=>openSection(sec));
      secGrid.appendChild(box);
    });

    block.appendChild(secGrid);
    grid.appendChild(block);
  }
}

/* ── 섹션 상세 ── */
function renderDetail(sec){
  const content=document.getElementById('detailContent');
  content.innerHTML='';
  const even=isEven(sec);
  const sd=data.filter(d=>d.section===sec);
  const floors=[...new Set(sd.map(d=>d.floor))].sort((a,b)=>b-a);

  // 섹션 통계
  const act=sd.filter(d=>d.status==='ACTIVE').length;
  const hld=sd.filter(d=>d.status==='HOLD').length;
  const sv=sd.filter(d=>d.saved==1).length;
  const ns=sd.filter(d=>!d.status).length;
  // 소재 범례
  const legend=document.createElement('div');
  legend.className='material-legend';
  const MATS=[
    ['CN10','#facc15','연노란색'],['CN20','#374151','검은색'],
    ['RS40','#0d9488','청록색'],['RS20','#6b7280','회색'],['CM20','#d1d5db','라이트그레이']
  ];
  legend.innerHTML=MATS.map(([name,color,label])=>
    `<div class="mat-chip"><div class="mat-dot" style="background:${color}"></div>${name}<span style="color:var(--muted);font-size:10px">(${label})</span></div>`
  ).join('');
  content.appendChild(legend);

  const statEl=document.createElement('div');
  statEl.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px';
  statEl.innerHTML=`
    <div class="stat-chip"><span class="sdot" style="background:#38bdf8"></span>전체<b>${sd.length}</b></div>
    <div class="stat-chip"><span class="sdot" style="background:#34d399"></span>ACTIVE<b>${act}</b></div>
    <div class="stat-chip"><span class="sdot" style="background:#fbbf24"></span>HOLD<b>${hld}</b></div>
    ${ns>0?`<div class="stat-chip"><span class="sdot" style="background:#536080"></span>미지정<b>${ns}</b></div>`:''}
  `;
  content.appendChild(statEl);

  // Q, R 섹션: 2컬럼 레이아웃 (1~4층 왼쪽, 5~8층 오른쪽)
  const isSplit = (sec==='Q'||sec==='R');
  if(isSplit){
    // 모든 슬롯을 order 순으로 가져와서 4개씩 행으로 나눔
    const allSlots = dedupeByKey(sd.sort((a,b)=>a.order-b.order));
    const wrap = document.createElement('div');
    wrap.style.cssText='display:flex;flex-direction:column;gap:6px';

    for(let i=0;i<allSlots.length;i+=4){
      const rowSlots = allSlots.slice(i,i+4);
      const row = document.createElement('div');
      row.style.cssText='display:flex;gap:6px;flex-wrap:nowrap';
      rowSlots.forEach(d=>row.appendChild(makeSlotEl(d)));
      wrap.appendChild(row);
      // 4개 단위마다 구분선
      if(i+4<allSlots.length){
        const sep=document.createElement('div');
        sep.style.cssText='height:1px;background:#e2e8f0;margin:2px 0';
        wrap.appendChild(sep);
      }
    }
    content.appendChild(wrap);
  } else {

  floors.forEach(floor=>{
    const fd=dedupeByKey(sd.filter(d=>d.floor===floor).sort((a,b)=>a.order-b.order));
    const fb=document.createElement('div');
    fb.className='floor-block';
    const fhd=document.createElement('div');
    fhd.className='floor-hd';
    fhd.textContent=floor+'층';
    fb.appendChild(fhd);

    const row=document.createElement('div');
    row.className='slots-row'+(even?' mirrored':'');

    const isGroupType=t=>t==='흰색'||t==='노란색'||t==='서랍';
    let i=0;
    while(i<fd.length){
      const d=fd[i];
      if(isGroupType(d.type)){
        const group=[];
        let j=i;
        while(j<fd.length&&fd[j].type===d.type&&group.length<4){group.push(fd[j]);j++;}
        const isDrawer=d.type==='서랍';
        const cellW=48;
        const zg=document.createElement('div');
        zg.className='zgroup'+(isDrawer?' drawers':'');

        let arranged;
        if(even){arranged=[group[1]||null,group[0]||null,group[3]||null,group[2]||null];}
        else{arranged=[group[0]||null,group[1]||null,group[2]||null,group[3]||null];}

        arranged.forEach(gd=>{
          if(gd){zg.appendChild(makeSlotEl(gd));}
          else{const em=document.createElement('div');em.style.cssText=`width:${cellW}px;`;zg.appendChild(em);}
        });
        row.appendChild(zg);i=j;
      }else{
        row.appendChild(makeSlotEl(d));i++;
      }
    }
    fb.appendChild(row);
    content.appendChild(fb);
  });
  } // end isTwoCol else
}

function getSlotGroupItems(d){
  return data.filter(x=>x.key===d.key);
}
function makeSlotEl(d){
  const slot=document.createElement('div');
  const tc=d.type||'unknown';
  const state=getSlotState(d);
  let cls=`slot ${tc} ${state}`;
  if(d.material)cls+=` mat-${d.material}`;
  if(d.item)cls+=' has-item';
  if(d.item && !d.qty) cls+=' no-qty';
  const staleInfo=getStaleInfo(d);
  if(staleInfo.stale)cls+=' stale';
  slot.className=cls;
  slot.style.position='relative';

  const slotId=`${d.section}${d.floor}-${d.order}`;
  let inner=`<span class="slot-id">${d.order}</span>`;
  if(d.material) inner+=`<span class="slot-material">${d.material}</span>`;
  if(staleInfo.stale) inner+=`<span class="stale-icon">⚠️</span>`;
  if(staleInfo.top100){
    inner+=`<span class="star-badge">★${staleInfo.top100}</span>`;
  }
  // 수량 top100
  const baseMat2 = (d.material||'').split(/[(\s]/)[0];
  const qtyKey = baseMat2 + '|' + (d.item||'').toLowerCase();
  const qtyRank = qtyTop100.get(qtyKey);
  if(qtyRank){
    inner+=`<span class="qty-badge">Q${qtyRank}</span>`;
  }

  // 멀티아이템 배지
  const groupItems=getSlotGroupItems(d);
  const itemCount=groupItems.filter(x=>x.item||x.material).length;
  if(itemCount>1) inner+=`<span class="slot-badge">${itemCount}</span>`;

  // 호버 툴팁
  let tip=`<b>${slotId}</b>`;
  if(itemCount>1) tip+=`<br>아이템 ${itemCount}개`;
  if(d.item) tip+=`<br>치수: ${d.item}`;
  if(d.material) tip+=`<br>소재: ${d.material}`;
  if(d.type) tip+=`<br>타입: ${d.type}`;
  if(d.qty) tip+=`<br>수량: ${d.qty}`;
  if(staleInfo.stale && staleInfo.lastOut==='') tip+=`<br>⚠️ 출고이력 없음`;
  else if(staleInfo.stale) tip+=`<br>⚠️ 마지막 출고: ${staleInfo.lastOut} (${staleInfo.days}일 전)`;
  else if(staleInfo.days>=0) tip+=`<br>마지막 출고: ${staleInfo.lastOut} (${staleInfo.days}일 전)`;
  if(staleInfo.lastIn) tip+=`<br>마지막 입고: ${staleInfo.lastIn}`;
  if(staleInfo.top100) tip+=`<br>⭐ 입출고 TOP #${staleInfo.top100}`;
  if(qtyRank) tip+=`<br>🔴 수량 TOP #${qtyRank}`;
  inner+=`<div class="slot-tip">${tip}</div>`;

  slot.innerHTML=inner;
  slot.setAttribute('data-id', d.id);
  slot.addEventListener('click',e=>{e.stopPropagation();openSlotPopup(d.key);});
  return slot;
}

async function loadHistoryCard(elemId, mat, item){
  const el = document.getElementById(elemId);
  if(!el) return;
  el.innerHTML='<div class="card-history-title">로딩 중...</div>';
  const hist = await loadShipmentHistory();
  const hKey = mat+'|'+item;
  const records = hist[hKey];
  if(records && records.length){
    el.innerHTML=`<div class="card-history-title">최근 입출고 이력</div>
      <table class="card-history-tbl">
        <tr><th>날짜</th><th>구분</th><th>수량</th><th>업체</th></tr>
        ${records.map(h=>`<tr class="${h.type==='출고'?'hist-out':'hist-in'}">
          <td>${h.date}</td><td>${h.type}</td><td>${h.qty.toLocaleString()}</td><td>${h.company||'-'}</td>
        </tr>`).join('')}
      </table>`;
  } else {
    el.innerHTML='<div class="card-history-title" style="color:var(--muted)">입출고 이력 없음</div>';
  }
}

function openSlotPopup(key){
  // 호버 툴팁 숨기기
  document.getElementById('slotTooltip').style.display='none';
  popupKey=key;
  popupEditingIdx=null;
  const items=data.filter(d=>d.key===key);
  if(items.length===0) return;
  const first=items[0];
  currentSection=first.section;
  const slotId=`${first.section}${first.floor}-${first.order}`;
  document.getElementById('popupTitle').textContent=slotId;
  document.getElementById('popupSubtitle').textContent=first.type?` (${first.type})`:'';
  renderPopupCards();
  document.getElementById('popupBackdrop').classList.add('on');
  document.getElementById('slotPopup').classList.add('on');
}
function closeSlotPopup(){
  document.getElementById('popupBackdrop').classList.remove('on');
  document.getElementById('slotPopup').classList.remove('on');
  popupKey=null;
  popupEditingIdx=null;
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeSlotPopup();
});

function saveCardInline(id,cardEl){
  const d=data[id];
  if(!d)return;
  d.material=cardEl.querySelector('.cedit-material').value;
  d.item=cardEl.querySelector('.cedit-item').value.trim();
  const qv=cardEl.querySelector('.cedit-qty').value;
  d.qty=qv===''?'':Number(qv);
  d.type=cardEl.querySelector('.cedit-type').value;
  const newStatus=cardEl.querySelector('.cedit-status').value;
  d.status=d.item?'':newStatus==='UNUSED'?'UNUSED':'';
  if(d.item && d.status==='UNUSED') d.status='';
  d.saved=Number(cardEl.querySelector('.cedit-saved').value);
  d.inDate=cardEl.querySelector('.cedit-indate').value;
  d.memo=cardEl.querySelector('.cedit-memo').value.trim();
  popupEditingIdx=null;
  renderPopupCards();
  if(currentSection) renderDetail(currentSection);
  else renderAll();
  renderStats();
  if(searchQ) renderSearchResults();
  showToast('⏳ 서버에 저장 중...');
  persist(d).then(()=>showToast('✅ 서버에 저장됨'));
}

function addCardToQueue(id,cardEl){
  const d=data[id];
  if(!d) return;
  const loc=`${d.section}${d.floor}-${d.order}`;
  // 편집 중인 값 읽기
  const item=cardEl.querySelector('.cedit-item')?cardEl.querySelector('.cedit-item').value.trim():(d.item||'');
  const mat=cardEl.querySelector('.cedit-material')?cardEl.querySelector('.cedit-material').value:(d.material||'');
  if(!item&&!mat){showToast('치수 또는 소재를 입력해주세요');return;}
  const q=getPrintQueue();
  const exists=q.find(x=>x.loc===loc&&x.item===item&&x.mat===mat);
  if(exists){showToast('이미 대기열에 있습니다');return;}
  q.push({loc,item,mat,ts:Date.now()});
  savePrintQueue(q);
  showToast('🏷 인쇄 대기열에 추가됨 ('+q.length+'개)');
}

function deleteCard(id){
  const d=data[id];
  if(!d) return;
  const items=data.filter(x=>x.key===popupKey);
  if(items.length<=1){
    // 마지막 아이템: 데이터 지우지 말고 필드만 초기화 (슬롯 자체는 유지)
    d.item='';d.material='';d.qty='';d.memo='';d.inDate='';d.saved=0;
    showToast('아이템 정보가 초기화됨');
  } else {
    // 여러 아이템 중 하나 삭제: data 배열에서 제거
    const idx=data.findIndex(x=>x.id===id);
    if(idx!==-1) data.splice(idx,1);
    // id 재인덱싱
    data.forEach((x,i)=>x.id=i);
    showToast('카드가 삭제됨');
  }
  renderPopupCards();
  if(currentSection) renderDetail(currentSection);
  else renderAll();
  renderStats();
  // TODO: 서버 동기화 - 멀티아이템 슬롯의 삭제는 saveAll로 전체 동기화 필요
  try{ localStorage.setItem('wh_cache_v1', JSON.stringify(data)); }catch(e){}
}

function addNewCard(){
  if(!popupKey) return;
  const items=data.filter(d=>d.key===popupKey);
  const first=items[0];
  if(!first) return;
  // 새 아이템 데이터 생성
  const newItem={
    id:data.length,
    key:popupKey,
    section:first.section,
    floor:first.floor,
    order:first.order,
    type:first.type,
    status:'',
    saved:0,
    item:'',
    material:'',
    qty:'',
    inDate:'',
    memo:''
  };
  data.push(newItem);
  popupEditingIdx=newItem.id;
  renderPopupCards();
  // TODO: 서버 동기화 - 새 아이템 추가 시 saveAll로 전체 동기화 필요
  try{ localStorage.setItem('wh_cache_v1', JSON.stringify(data)); }catch(e){}
}

    if(type==='entrance'){
      block.style.cssText+=';background:#78716c;color:#fff;cursor:default;font-size:clamp(10px,2.5vw,16px)';
      block.textContent=sec;
    } else {
      const gid=secToGroup[sec];
      block.classList.add(groupColors[gid]||'sec-extra');
      block.textContent=sec;
      block.addEventListener('click',()=>{
        fullViewGroup=gid;
        renderFullView();
      });
    }
    grid.appendChild(block);
  });

  container.appendChild(grid);
  wrap.appendChild(container);
}

function renderFullDetail(groupId, wrap){
  const g=WH_GROUPS.find(x=>x.id===groupId);

  const detail=document.createElement('div');

  const back=document.createElement('button');

  back.innerHTML='&#9664; 전체 보기';

      const col=document.createElement('div');
      col.style.cssText='display:flex;flex-direction:column;gap:4px;flex-shrink:0;min-width:60px';
      col.className='extra-col';
      const hd=document.createElement('div');

      hd.textContent=label;
      col.appendChild(hd);
      secs.forEach(sec=>{
        if(secSet.has(sec)){
          col.appendChild(makeSecBlockFull(sec));
        } else {
          const ph=document.createElement('div');
          ph.className='wh-placeholder';
          ph.style.minHeight='60px';
          ph.innerHTML=`<span>${sec}</span>`;
          col.appendChild(ph);
        }
      });

    };

  // 메인 섹션 (오른쪽)
  const sections=document.createElement('div');
  sections.className='wh-detail-sections';
  sections.style.flex='1';

  g.aisles.forEach((block,bi)=>{
    block.forEach(item=>{
